services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    restart: always
    ports:
      - "38080:8080"
    environment:
      KC_DB: postgres
      KC_DB_USERNAME: kc
      KC_DB_PASSWORD: DB_PASSWORD
      KC_DB_URL: jdbc:postgresql://keycloak-db/keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: Password
      KC_HOSTNAME: http://127.0.0.1:38080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    depends_on:
      - keycloak-db

  keycloak-db:
    image: postgres:18.2-alpine3.23
    restart: always
    volumes:
      - ./postgres-data-keycloak:/var/lib/postgresql
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_PASSWORD: DB_PASSWORD
      POSTGRES_USER: kc

  db:
    image: postgres:18.2-alpine3.23
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_USER: admin
    volumes:
      - ./postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: apps/expense_tracker/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      RUST_LOG: debug
      EXPENSE_TRACKER_IGNORE_TLS: "1"
    volumes:
      - ./config/settings_compose.toml:/app/config/settings.toml:ro
    depends_on:
      - db
      - keycloak

  web:
    build:
      context: .
      dockerfile: apps/expense-tracker-frontend/Dockerfile
      args:
        NODE_ENV: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - apps/expense-tracker-frontend/.env.compose
    depends_on:
      - api
      - keycloak
